# ToStamp CI/CD — Google Cloud Build
# Triggered on push to main branch.
# Builds, tests, and deploys to Cloud Run.

steps:
  # Step 1: Build Docker image
  - id: 'build-image'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tostamp-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tostamp-api:latest'
      - './backend'

  # Step 2: Push Docker image
  - id: 'push-image'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tostamp-api:$COMMIT_SHA'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - id: 'deploy-cloud-run'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tostamp-api'
      - '--image=gcr.io/$PROJECT_ID/tostamp-api:$COMMIT_SHA'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60s'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID'
    waitFor: ['push-image']

  # Step 4: Latency test against deployed service
  - id: 'latency-test'
    name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install httpx --quiet
        # Get Cloud Run service URL
        SERVICE_URL=$(gcloud run services describe tostamp-api \
          --region=asia-northeast3 \
          --format='value(status.url)')
        echo "Testing against: $SERVICE_URL"
        # Run latency test
        API_BASE=$SERVICE_URL python backend/tests/test_stamp_latency.py
    waitFor: ['deploy-cloud-run']

images:
  - 'gcr.io/$PROJECT_ID/tostamp-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/tostamp-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'
