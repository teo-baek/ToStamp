name: tostamp
description: "ToStamp - 소상공인을 위한 지능형 마케팅 에이전트 서비스"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP & WebSocket
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Auth
  kakao_flutter_sdk: ^1.9.6

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # UI
  google_fonts: ^6.2.1
  lottie: ^3.1.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Material Design
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
