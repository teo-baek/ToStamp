name: tostamp
description: "ToStamp - 소상공인을 위한 지능형 마케팅 에이전트 서비스"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP & WebSocket
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Auth
  kakao_flutter_sdk: ^1.9.6

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # Image
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
